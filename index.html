<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 style="color: #03045e;"> Tic Tac Toe</h1>
    <div class="game">
      <div class="buttons">
        <button class="box in1"></button>
        <button class="box in"></button>
        <button class="box in3"></button>
        <button class="box in1" style="border-top:7px solid black; border-bottom:7px solid black;"></button>
        <button class="box in5"></button>
        <button class="box in5" style="border-left: 6px solid black;"></button>
        <button class="box in1"></button>
        <button class="box in"></button>
        <button class="box in3"></button>
      </div>
    </div>
  </div>
  <div class="reset">
    <button id="reset">Replay</button>
  </div>
  <div id="Line">
    <p></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
